<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "on-background": "#1b1b23",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#e4e1ed",
              "on-surface": "#1b1b23",
              "outline": "#767586",
              "on-secondary-fixed-variant": "#3323cc",
              "primary-container": "#6063ee",
              "tertiary-fixed-dim": "#ffb783",
              "surface": "#fcf8ff",
              "tertiary-container": "#b55d00",
              "on-error-container": "#93000a",
              "primary-fixed": "#e1e0ff",
              "surface-container-low": "#f5f2fe",
              "on-primary-container": "#fffbff",
              "on-tertiary-container": "#fffbff",
              "inverse-surface": "#303038",
              "inverse-on-surface": "#f2effb",
              "on-tertiary-fixed-variant": "#703700",
              "primary-fixed-dim": "#c0c1ff",
              "primary": "#4648d4",
              "on-primary-fixed": "#07006c",
              "outline-variant": "#c7c4d7",
              "on-secondary-fixed": "#0f0069",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-error": "#ffffff",
              "on-primary-fixed-variant": "#2f2ebe",
              "on-tertiary-fixed": "#301400",
              "secondary": "#4b41e1",
              "secondary-fixed": "#e2dfff",
              "on-secondary-container": "#fffbff",
              "secondary-container": "#645efb",
              "on-surface-variant": "#464554",
              "surface-container-highest": "#e4e1ed",
              "surface-bright": "#fcf8ff",
              "secondary-fixed-dim": "#c3c0ff",
              "surface-tint": "#494bd6",
              "surface-dim": "#dbd8e4",
              "tertiary": "#904900",
              "surface-container": "#efecf8"
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "spacing": {
              "margin-mobile": "16px",
              "xs": "4px",
              "lg": "24px",
              "container-max": "1280px",
              "sm": "8px",
              "base": "4px",
              "2xl": "48px",
              "xl": "32px",
              "md": "16px",
              "3xl": "64px",
              "gutter": "24px"
            }
          }
        }
      }
    </script>
    <style>
        body {
            background-color: #f5f2fe; /* surface-container-low */
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .register-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #4648d4 0%, #645efb 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center p-4">
    <!-- Register Container -->
    <main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl p-8 md:p-10 register-card mx-auto">
        <!-- Brand Header -->
        <div class="flex flex-col items-center mb-6 text-center">
            <a href="/" class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-4 text-on-primary-container hover:opacity-90">
                <span class="material-symbols-outlined text-3xl">shopping_cart</span>
            </a>
            <h1 class="font-headline-lg text-headline-lg text-on-surface font-semibold mb-2">Store</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Create your account to start shopping.</p>
        </div>

        <!-- Error Banner -->
        <div id="error-banner" class="hidden mb-4 p-md bg-error-container text-on-error-container rounded-lg font-body-sm flex items-center gap-sm">
            <span class="material-symbols-outlined">error</span>
            <span id="error-message">Could not complete registration.</span>
        </div>

        <!-- Form -->
        <form id="register-form" class="space-y-4" method="POST">
            {% csrf_token %}
            <!-- Full Name -->
            <div class="space-y-1">
                <label class="font-label-md text-label-md text-on-surface font-medium" for="full_name">Full Name</label>
                <input class="w-full px-4 py-3 bg-surface-container rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed outline-none transition-all font-body-md text-body-md" id="full_name" name="full_name" placeholder="John Doe" required type="text"/>
            </div>

            <!-- Email -->
            <div class="space-y-1">
                <label class="font-label-md text-label-md text-on-surface font-medium" for="email">Email Address</label>
                <input class="w-full px-4 py-3 bg-surface-container rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed outline-none transition-all font-body-md text-body-md" id="email" name="email" placeholder="email@example.com" required type="email"/>
            </div>

            <!-- Password -->
            <div class="space-y-1">
                <label class="font-label-md text-label-md text-on-surface font-medium" for="password">Password</label>
                <input class="w-full px-4 py-3 bg-surface-container rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed outline-none transition-all font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required type="password"/>
            </div>

            <!-- Confirm Password -->
            <div class="space-y-1">
                <label class="font-label-md text-label-md text-on-surface font-medium" for="confirm_password">Confirm Password</label>
                <input class="w-full px-4 py-3 bg-surface-container rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-fixed outline-none transition-all font-body-md text-body-md" id="confirm_password" name="confirm_password" placeholder="••••••••" required type="password"/>
            </div>

            <!-- Action Button -->
            <button id="submit-btn" class="w-full py-4 rounded-lg btn-gradient text-on-primary font-headline-sm text-headline-sm transition-all active:scale-[0.98] shadow-lg shadow-primary/20 hover:opacity-95" type="submit">
                Create Account
            </button>
        </form>

        <div class="text-center font-body-sm text-body-sm text-on-surface-variant mt-6">
            Already have an account? 
            <a class="text-primary font-semibold hover:underline decoration-primary-container" href="/auth/login/">Sign in</a>
        </div>
    </main>

    <!-- Simple Footer for Transactional Page -->
    <footer class="py-6 border-t border-surface-container-highest mt-6">
        <div class="max-w-container-max mx-auto px-4 text-center text-on-surface-variant font-body-sm text-body-sm">
            © 2026. All rights reserved.
        </div>
    </footer>

    {% load static %}
    <script src="{% static 'users/js/auth.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('register-form');
            const errorBanner = document.getElementById('error-banner');
            const errorMessage = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorBanner.classList.add('hidden');

                const name = document.getElementById('full_name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const passwordConfirm = document.getElementById('confirm_password').value;

                if (password !== passwordConfirm) {
                    errorMessage.textContent = 'Passwords do not match.';
                    errorBanner.classList.remove('hidden');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating Account...';

                try {
                    const response = await fetch('/api/auth/register/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name,
                            email,
                            password,
                            password_confirm: passwordConfirm
                        })
                    });

                    const data = await response.json();

                    if (response.status === 201) {
                        // Success! Let's log them in automatically by sending credentials to login endpoint
                        const loginResponse = await fetch('/api/auth/login/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });

                        if (loginResponse.ok) {
                            const loginData = await loginResponse.json();
                            AUTH.setTokens(loginData.access, loginData.refresh);
                            AUTH.setUser(loginData.user);
                            window.location.href = '/';
                        } else {
                            // If auto-login fails, send to login page
                            window.location.href = '/auth/login/?registered=1';
                        }
                    } else {
                        // Gather details of validation errors
                        let errorMsg = '';
                        if (data.email) errorMsg += 'Email: ' + data.email.join(' ') + ' ';
                        if (data.password) errorMsg += 'Password: ' + data.password.join(' ') + ' ';
                        if (data.non_field_errors) errorMsg += data.non_field_errors.join(' ') + ' ';
                        if (!errorMsg) errorMsg = data.error || data.detail || 'Registration failed. Verify fields.';
                        
                        errorMessage.textContent = errorMsg;
                        errorBanner.classList.remove('hidden');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Create Account';
                    }
                } catch (err) {
                    console.error('Registration error:', err);
                    errorMessage.textContent = 'Server connection error. Please try again.';
                    errorBanner.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            });
        });
    </script>
</body>
</html>
