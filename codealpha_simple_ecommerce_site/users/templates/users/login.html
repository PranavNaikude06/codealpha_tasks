<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "on-background": "#1b1b23",
              "on-secondary": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#e4e1ed",
              "on-surface": "#1b1b23",
              "outline": "#767586",
              "on-secondary-fixed-variant": "#3323cc",
              "primary-container": "#6063ee",
              "tertiary-fixed-dim": "#ffb783",
              "surface": "#fcf8ff",
              "tertiary-container": "#b55d00",
              "on-error-container": "#93000a",
              "primary-fixed": "#e1e0ff",
              "surface-container-low": "#f5f2fe",
              "on-primary-container": "#fffbff",
              "on-tertiary-container": "#fffbff",
              "inverse-surface": "#303038",
              "inverse-on-surface": "#f2effb",
              "on-tertiary-fixed-variant": "#703700",
              "primary-fixed-dim": "#c0c1ff",
              "primary": "#4648d4",
              "on-primary-fixed": "#07006c",
              "outline-variant": "#c7c4d7",
              "on-secondary-fixed": "#0f0069",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-error": "#ffffff",
              "on-primary-fixed-variant": "#2f2ebe",
              "on-tertiary-fixed": "#301400",
              "secondary": "#4b41e1",
              "secondary-fixed": "#e2dfff",
              "on-secondary-container": "#fffbff",
              "secondary-container": "#645efb",
              "on-surface-variant": "#464554",
              "surface-container-highest": "#e4e1ed",
              "surface-bright": "#fcf8ff",
              "secondary-fixed-dim": "#c3c0ff",
              "surface-tint": "#494bd6",
              "surface-dim": "#dbd8e4",
              "tertiary": "#904900",
              "surface-container": "#efecf8"
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "spacing": {
              "margin-mobile": "16px",
              "xs": "4px",
              "lg": "24px",
              "container-max": "1280px",
              "sm": "8px",
              "base": "4px",
              "2xl": "48px",
              "xl": "32px",
              "md": "16px",
              "3xl": "64px",
              "gutter": "24px"
            }
          }
        }
      }
    </script>
    <style>
        body {
            background-color: #f5f2fe; /* surface-container-low */
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .login-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Login Container -->
    <main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl login-card overflow-hidden">
        <div class="p-xl md:p-2xl flex flex-col gap-xl">
            <!-- Logo and Header -->
            <div class="flex flex-col items-center gap-md text-center">
                <a href="/" class="flex items-center gap-xs cursor-pointer hover:opacity-90">
                    <span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
                    <span class="font-headline-sm text-headline-sm text-primary tracking-tight font-semibold">Store</span>
                </a>
                <div class="space-y-xs">
                    <h1 class="font-headline-md text-headline-md text-on-surface font-semibold">Welcome back</h1>
                    <p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your details to sign in</p>
                </div>
            </div>

            <!-- Global Error Banner -->
            <div id="error-banner" class="hidden p-md bg-error-container text-on-error-container rounded-lg font-body-sm flex items-center gap-sm">
                <span class="material-symbols-outlined">error</span>
                <span id="error-message">Invalid email or password.</span>
            </div>

            <!-- Form -->
            <form id="login-form" class="flex flex-col gap-lg" method="POST">
                {% csrf_token %}
                <!-- Email Field -->
                <div class="flex flex-col gap-base">
                    <label class="font-label-md text-label-md text-on-surface-variant font-medium" for="email">Email Address</label>
                    <input class="w-full h-12 px-md font-body-md text-body-md rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none bg-surface" id="email" name="email" placeholder="name@company.com" type="email" required/>
                </div>

                <!-- Password Field -->
                <div class="flex flex-col gap-base">
                    <label class="font-label-md text-label-md text-on-surface-variant font-medium" for="password">Password</label>
                    <input class="w-full h-12 px-md font-body-md text-body-md rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none bg-surface" id="password" name="password" placeholder="••••••••" type="password" required/>
                </div>

                <!-- Primary Action -->
                <button id="submit-btn" class="w-full h-12 bg-gradient-to-r from-primary to-secondary text-on-secondary font-label-md text-label-md rounded-lg shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </button>

                <!-- Footer Links -->
                <div class="text-center">
                    <p class="font-body-sm text-body-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="font-label-md text-label-md text-primary font-semibold hover:underline ml-xs" href="/auth/register/">Register</a>
                    </p>
                </div>
            </form>
        </div>
    </main>

    <!-- Background Decorative Elements -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px]"></div>
    </div>

    {% load static %}
    <script src="{% static 'users/js/auth.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const errorBanner = document.getElementById('error-banner');
            const errorMessage = document.getElementById('error-message');
            const submitBtn = document.getElementById('submit-btn');

            // Fade in animation
            const card = document.querySelector('.login-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorBanner.classList.add('hidden');
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span> Signing In...';

                try {
                    const response = await fetch('/api/auth/login/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Store credentials
                        AUTH.setTokens(data.access, data.refresh);
                        AUTH.setUser(data.user);

                        // Redirect to the originally requested page, or home
                        const params = new URLSearchParams(window.location.search);
                        const next = params.get('next') || '/';
                        window.location.href = next;
                    } else {
                        errorMessage.textContent = data.error || data.detail || 'Failed to authenticate.';
                        errorBanner.classList.remove('hidden');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = 'Sign In <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    errorMessage.textContent = 'Server connection failed. Please try again.';
                    errorBanner.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Sign In <span class="material-symbols-outlined text-[18px]">arrow_forward</span>';
                }
            });
        });
    </script>
</body>
</html>
