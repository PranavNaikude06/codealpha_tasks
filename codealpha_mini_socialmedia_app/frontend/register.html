<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - Nexus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-secondary-fixed-variant": "#39485c",
                    "on-surface-variant": "#454653",
                    "outline-variant": "#c6c5d5",
                    "on-primary-fixed-variant": "#2b38aa",
                    "surface-dim": "#d4daea",
                    "on-error": "#ffffff",
                    "secondary-fixed": "#d4e4fc",
                    "on-tertiary-container": "#fff6f2",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#dde2f3",
                    "on-background": "#161c27",
                    "tertiary": "#874a00",
                    "inverse-primary": "#bdc2ff",
                    "tertiary-container": "#aa5f00",
                    "on-tertiary-fixed-variant": "#6c3a00",
                    "on-primary-container": "#faf7ff",
                    "surface-container-low": "#f1f3ff",
                    "error-container": "#ffdad6",
                    "outline": "#767684",
                    "on-surface": "#161c27",
                    "on-primary-fixed": "#000965",
                    "on-error-container": "#93000a",

                    "error": "#ba1a1a",
                    "secondary-fixed-dim": "#b8c8e0",
                    "surface": "#f9f9ff",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#556479",
                    "surface-tint": "#4552c3",
                    "surface-container": "#e8eeff",
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#ecf0ff",
                    "surface-container-high": "#e3e8f9",
                    "tertiary-fixed": "#ffdcc1",
                    "surface-variant": "#dde2f3",
                    "primary": "#404dbe",
                    "on-tertiary-fixed": "#2e1500",
                    "inverse-surface": "#2a303d",
                    "secondary": "#515f74",
                    "tertiary-fixed-dim": "#ffb778"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",

            "spacing": {

                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

<style>
        body {
            background-color: #F7F8FC;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .auth-card {
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.08);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-md">
<script>
  api.redirectIfAuthenticated();
</script>
<!-- Registration Content Canvas -->
<main class="w-full max-w-[400px] flex flex-col gap-lg items-center">
<!-- Brand Logo / Identity Anchor -->
<div class="flex items-center gap-sm mb-sm animate-fade-in">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-[24px]" data-icon="hub">hub</span>
</div>
<h1 class="font-headline-md text-headline-md font-extrabold text-primary tracking-tight">Nexus</h1>
</div>
<!-- Central Auth Card -->
<div class="auth-card bg-surface-container-lowest w-full rounded-xl p-xl flex flex-col border border-outline-variant">
<!-- Header Section -->
<div class="flex flex-col gap-xs mb-lg">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Create Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Join Nexus today</p>
</div>
<!-- Error alert box -->
<div id="error-message" class="w-full mb-md p-sm bg-error-container text-error font-body-md text-body-md rounded-lg hidden"></div>

<!-- Registration Form -->
<form class="flex flex-col gap-md" id="register-form">
<!-- Username Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="username">Username</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-[18px] text-outline group-focus-within:text-primary transition-colors" data-icon="person">person</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl py-[12px] pl-[44px] pr-md font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline" id="username" placeholder="johndoe" type="text" required minlength="3" maxlength="30"/>
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-[18px] text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl py-[12px] pl-[44px] pr-md font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline" id="email" placeholder="name@example.com" type="email" required/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-[18px] text-outline group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-xl py-[12px] pl-[44px] pr-md font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password" required minlength="6"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button" id="toggle-pwd-btn">
<span class="material-symbols-outlined text-[18px]" data-icon="visibility" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Terms Notice -->
<p class="font-label-sm text-label-sm text-on-surface-variant text-center px-md mt-sm">
                    By creating an account, you agree to our <a class="text-primary font-bold hover:underline" href="#">Terms of Service</a>.
                </p>
<!-- Action Button -->
<button class="mt-md w-full bg-primary-container text-on-primary-container font-label-sm text-label-sm py-[14px] px-lg rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit" id="submit-btn">
                    Create Account
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="flex flex-col items-center gap-sm">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="login.html">Login</a>
</p>
</div>
</main>
<!-- Background Decoration (Atmospheric Elements) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[400px] h-[400px] bg-secondary-container opacity-20 blur-[100px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[300px] h-[300px] bg-primary-container opacity-10 blur-[80px] rounded-full"></div>
</div>
<script>
        // Password visibility toggle
        const pwdInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        document.getElementById('toggle-pwd-btn').addEventListener('click', () => {
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                pwdInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        });

        const form = document.getElementById('register-form');
        const submitBtn = document.getElementById('submit-btn');
        const errMsg = document.getElementById('error-message');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            errMsg.classList.add('hidden');
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size: 20px;">progress_activity</span> Creating...';
            submitBtn.disabled = true;

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await api.post('/auth/register', { username, email, password });
                api.setToken(response.token);
                api.setUser(response.user);
                window.location.href = 'index.html';
            } catch (err) {
                errMsg.textContent = err.message || 'Registration failed';
                errMsg.classList.remove('hidden');
                submitBtn.innerHTML = 'Create Account <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>';
                submitBtn.disabled = false;
            }
        });
    </script>
</body></html>
