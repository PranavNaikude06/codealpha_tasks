<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexus | Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#0d1c2e",
                        "secondary-container": "#d1e1fa",
                        "primary-fixed": "#dfe0ff",
                        "background": "#f9f9ff",
                        "surface-bright": "#f9f9ff",
                        "on-secondary-fixed-variant": "#39485c",
                        "on-surface-variant": "#454653",
                        "outline-variant": "#c6c5d5",
                        "on-primary-fixed-variant": "#2b38aa",
                        "surface-dim": "#d4daea",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#d4e4fc",
                        "on-tertiary-container": "#fff6f2",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#dde2f3",
                        "on-background": "#161c27",
                        "tertiary": "#874a00",
                        "inverse-primary": "#bdc2ff",
                        "tertiary-container": "#aa5f00",
                        "on-tertiary-fixed-variant": "#6c3a00",
                        "on-primary-container": "#faf7ff",
                        "surface-container-low": "#f1f3ff",
                        "error-container": "#ffdad6",
                        "outline": "#767684",
                        "on-surface": "#161c27",
                        "on-primary-fixed": "#000965",
                        "on-error-container": "#93000a",
                        "primary-container": "#5a67d8",
                        "primary-fixed-dim": "#bdc2ff",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#b8c8e0",
                        "surface": "#f9f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#556479",
                        "surface-tint": "#4552c3",
                        "surface-container": "#e8eeff",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#ecf0ff",
                        "surface-container-high": "#e3e8f9",
                        "tertiary-fixed": "#ffdcc1",
                        "surface-variant": "#dde2f3",
                        "primary": "#404dbe",
                        "on-tertiary-fixed": "#2e1500",
                        "inverse-surface": "#2a303d",
                        "secondary": "#515f74",
                        "tertiary-fixed-dim": "#ffb778"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "base": "4px",
                        "xs": "4px",
                        "xl": "32px",
                        "container-margin": "16px",
                        "lg": "24px",
                        "sm": "8px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "label-sm": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["15px", { "lineHeight": "22px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface">
<!-- TopNavBar -->
<header class="bg-surface-container-lowest sticky top-0 z-50 border-b border-outline-variant">
<div class="flex justify-between items-center w-full px-lg py-sm max-w-7xl mx-auto">
<a class="font-headline-md text-headline-md font-bold text-primary" href="index.html">Nexus</a>
<nav class="hidden md:flex gap-lg items-center">
<a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md" href="index.html">Feed</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md" href="explore.html">Explore</a>
<a class="text-primary font-bold border-b-2 border-primary pb-1 font-body-md text-body-md" id="nav-profile-link" href="#">Profile</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md" href="#" onclick="api.logout(); return false;">Logout</a>
</nav>
<!-- Mobile Menu Toggle -->
<button class="md:hidden text-on-surface-variant" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
<!-- Mobile Dropdown Menu -->
<div id="mobile-menu" class="hidden md:hidden bg-surface-container-lowest border-b border-outline-variant py-sm px-lg flex flex-col gap-sm">
<a class="text-on-surface-variant hover:text-primary font-body-md text-body-md" href="index.html">Feed</a>
<a class="text-on-surface-variant hover:text-primary font-body-md text-body-md" href="explore.html">Explore</a>
<a class="text-on-surface-variant hover:text-primary font-body-md text-body-md" id="mobile-nav-profile-link" href="#">Profile</a>
<a class="text-on-surface-variant hover:text-primary font-body-md text-body-md" href="#" onclick="api.logout(); return false;">Logout</a>
</div>
</header>
<main class="max-w-4xl mx-auto px-container-margin py-xl space-y-lg">
<!-- Profile Header Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0px_1px_4px_rgba(0,0,0,0.08)] p-lg overflow-hidden relative">
<!-- Decorative Background Element -->
<div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-primary-container to-surface-tint opacity-10"></div>
<div class="relative z-10 flex flex-col md:flex-row md:items-end gap-md">
<div class="relative">
<img id="profile-avatar" alt="Avatar" class="w-[72px] h-[72px] rounded-full border-4 border-surface-container-lowest shadow-sm object-cover" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150"/>
</div>
<div class="flex-1 space-y-xs min-w-0">
<h1 id="profile-display-name" class="font-headline-lg text-headline-lg text-on-surface break-all">...</h1>
<p id="profile-bio" class="text-on-surface-variant font-body-md text-body-md">...</p>
</div>
<div class="mt-md md:mt-0" id="profile-action-container">
  <!-- Follow/Unfollow/Edit btn goes here -->
</div>
</div>
<!-- Stats Row -->
<div class="mt-lg pt-lg border-t border-outline-variant flex gap-xl">
<div class="text-center md:text-left">
<span id="post-count" class="block font-bold text-on-surface font-headline-md text-headline-md">0</span>
<span class="text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">Posts</span>
</div>
<div class="text-center md:text-left">
<span id="follower-count" class="block font-bold text-on-surface font-headline-md text-headline-md">0</span>
<span class="text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">Followers</span>
</div>
<div class="text-center md:text-left">
<span id="following-count" class="block font-bold text-on-surface font-headline-md text-headline-md">0</span>
<span class="text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">Following</span>
</div>
</div>
</section>
<!-- Tab Bar -->
<div class="flex border-b border-outline-variant">
<button class="px-lg py-md border-b-2 border-primary text-primary font-bold font-label-sm text-label-sm flex items-center gap-xs">
<span class="material-symbols-outlined" style="font-size: 18px;">grid_view</span>
                Posts
            </button>
</div>
<!-- Posts Grid / List -->
<div class="max-w-[640px] mx-auto lg:mx-0 flex flex-col gap-md" id="posts-container">
  <!-- Posts loaded here -->
</div>
<!-- Empty State -->
<div class="hidden flex-col items-center justify-center py-xl text-center" id="empty-state">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-outline text-[32px]">group_add</span>
</div>
<h4 class="font-headline-md text-headline-md text-on-surface">No posts yet</h4>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Check back later for updates.</p>
</div>
<!-- Loader -->
<div class="py-lg flex flex-col items-center gap-sm" id="loader">
<div class="flex gap-xs">
<span class="w-2 h-2 bg-primary rounded-full animate-bounce"></span>
<span class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:-0.15s]"></span>
<span class="w-2 h-2 bg-primary rounded-full animate-bounce [animation-delay:-0.3s]"></span>
</div>
<p class="text-on-surface-variant text-label-sm">Loading posts...</p>
</div>
</main>
<!-- Bottom Navigation (Mobile Only) -->
<footer class="md:hidden fixed bottom-0 left-0 right-0 bg-surface-container-lowest border-t border-outline-variant flex justify-around py-sm z-50">
<a class="flex flex-col items-center gap-xs text-on-surface-variant p-sm" href="index.html">
<span class="material-symbols-outlined">dynamic_feed</span>
</a>
<a class="flex flex-col items-center gap-xs text-on-surface-variant p-sm" href="explore.html">
<span class="material-symbols-outlined">explore</span>
</a>
<a class="flex flex-col items-center gap-xs text-primary p-sm" id="mobile-bottom-profile-link" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_circle</span>
</a>
<a class="flex flex-col items-center gap-xs text-on-surface-variant p-sm" href="edit_profile.html">
<span class="material-symbols-outlined">settings</span>
</a>
</footer>
<script src="api.js"></script>
<script>
    api.checkAuth();
    const currentUser = api.getUser();

    const username = new URLSearchParams(window.location.search).get('username') || currentUser.username;

    // Set up profile links
    const profileHref = `profile.html?username=${currentUser.username}`;
    document.getElementById('nav-profile-link').href = profileHref;
    if (document.getElementById('mobile-nav-profile-link')) document.getElementById('mobile-nav-profile-link').href = profileHref;
    document.getElementById('mobile-bottom-profile-link').href = profileHref;

    // Load Profile details
    async function loadProfile() {
        try {
            const data = await api.get(`/users/${username}`);
            document.getElementById('profile-avatar').src = data.avatar_url || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150';
            document.getElementById('profile-display-name').textContent = `${data.username} (@${data.username})`;
            document.getElementById('profile-bio').textContent = data.bio || 'No bio yet.';
            document.getElementById('post-count').textContent = data.post_count;
            document.getElementById('follower-count').textContent = data.follower_count;
            document.getElementById('following-count').textContent = data.following_count;

            const actionContainer = document.getElementById('profile-action-container');
            if (data.is_own) {
                actionContainer.innerHTML = `
                    <a href="edit_profile.html" class="block text-center px-[20px] py-[10px] bg-primary text-on-primary rounded-lg font-label-sm text-label-sm hover:opacity-90 transition-all shadow-sm">
                        Edit Profile
                    </a>`;
            } else {
                const followBtnClass = data.is_following 
                    ? "px-[20px] py-[10px] bg-surface-container-high text-on-surface border border-outline-variant rounded-lg font-label-sm text-label-sm hover:bg-opacity-95 transition-all shadow-sm"
                    : "px-[20px] py-[10px] bg-primary text-on-primary rounded-lg font-label-sm text-label-sm hover:opacity-90 transition-all shadow-sm";
                
                actionContainer.innerHTML = `
                    <button onclick="toggleFollow('${data.username}', ${data.is_following}, this)" class="${followBtnClass}">
                        ${data.is_following ? 'Unfollow' : 'Follow'}
                    </button>`;
            }
        } catch (e) {
            console.error('Failed to load user profile', e);
            document.getElementById('profile-display-name').textContent = 'User not found';
            document.getElementById('profile-bio').textContent = 'This account does not exist or could not be loaded.';
            document.getElementById('post-count').textContent = '—';
            document.getElementById('follower-count').textContent = '—';
            document.getElementById('following-count').textContent = '—';
        }
    }

    // Toggle follow status
    async function toggleFollow(targetUsername, isFollowing, btn) {
        btn.disabled = true;
        try {
            if (isFollowing) {
                await api.delete(`/users/${targetUsername}/follow`);
            } else {
                await api.post(`/users/${targetUsername}/follow`);
            }
            loadProfile();
        } catch (e) {
            alert(e.message || 'Action failed');
        } finally {
            btn.disabled = false;
        }
    }

    // Load User Posts
    async function loadUserPosts() {
        const postsContainer = document.getElementById('posts-container');
        const loader = document.getElementById('loader');
        const emptyState = document.getElementById('empty-state');
        
        try {
            const posts = await api.get(`/users/${username}/posts`);
            loader.classList.add('hidden');
            
            if (posts.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                postsContainer.innerHTML = '';
                return;
            }
            
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
            
            postsContainer.innerHTML = posts.map(p => {
                const isOwn = p.user_id === currentUser.id;
                const likedClass = p.is_liked ? 'text-primary' : 'text-on-surface-variant';
                const likedFill = p.is_liked ? '1' : '0';
                const imageHtml = p.image_url ? `<img src="${p.image_url}" alt="Post Image" class="w-full h-[320px] object-cover rounded-lg mb-md"/>` : '';
                const editDeleteHtml = isOwn ? `
                    <div class="flex gap-sm">
                        <button onclick="editPost(${p.id}, this)" class="text-on-surface-variant hover:text-tertiary transition-colors"><span class="material-symbols-outlined text-[20px]">edit</span></button>
                        <button onclick="deletePost(${p.id})" class="text-on-surface-variant hover:text-error transition-colors"><span class="material-symbols-outlined text-[20px]">delete</span></button>
                    </div>` : '';

                return `
                <article class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant overflow-hidden w-full" id="post-${p.id}">
                    <div class="p-md">
                        <div class="flex justify-between items-start mb-md">
                            <div class="flex gap-md">
                                <img src="${p.author.avatar_url || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150'}" alt="${p.author.username}" class="w-10 h-10 rounded-full object-cover"/>
                                <div>
                                    <h3 class="font-bold text-on-surface font-body-lg text-body-lg">${p.author.username}</h3>
                                    <p class="text-on-surface-variant text-[12px]">${api.formatRelativeTime(p.created_at)} ${p.is_edited ? '• Edited' : ''}</p>
                                </div>
                            </div>
                        </div>
                        <p class="font-body-md text-body-md text-on-surface mb-md whitespace-pre-wrap post-content">${p.content}</p>
                        ${imageHtml}
                        <!-- Action Bar -->
                        <div class="flex items-center justify-between pt-sm border-t border-outline-variant">
                            <div class="flex gap-lg">
                                <button onclick="toggleLike(${p.id}, this)" class="flex items-center gap-xs ${likedClass} transition-colors">
                                    <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' ${likedFill}">favorite</span>
                                    <span class="text-label-sm like-count">${p.like_count}</span>
                                </button>
                                <a href="post.html?id=${p.id}" class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-[20px]">comment</span>
                                    <span class="text-label-sm">${p.comment_count}</span>
                                </a>
                            </div>
                            ${editDeleteHtml}
                        </div>
                    </div>
                </article>`;
            }).join('');
        } catch (e) {
            loader.classList.add('hidden');
            postsContainer.innerHTML = `<p class="text-on-surface-variant font-body-md text-body-md py-lg text-center">${e.message || 'Failed to load posts.'}</p>`;
            console.error(e);
        }
    }

    // Toggle post like
    async function toggleLike(postId, btn) {
        const icon = btn.querySelector('.material-symbols-outlined');
        const countSpan = btn.querySelector('.like-count');
        const isLiked = icon.style.fontVariationSettings.includes("'FILL' 1");
        
        let count = parseInt(countSpan.textContent);
        
        if (isLiked) {
            icon.style.fontVariationSettings = "'FILL' 0";
            btn.classList.remove('text-primary');
            btn.classList.add('text-on-surface-variant');
            countSpan.textContent = count - 1;
        } else {
            icon.style.fontVariationSettings = "'FILL' 1";
            btn.classList.add('text-primary');
            btn.classList.remove('text-on-surface-variant');
            countSpan.textContent = count + 1;
            btn.classList.add('scale-110');
            setTimeout(() => btn.classList.remove('scale-110'), 200);
        }

        try {
            if (isLiked) {
                await api.delete(`/posts/${postId}/like`);
            } else {
                await api.post(`/posts/${postId}/like`);
            }
        } catch (e) {
            console.error(e);
            alert('Could not update like');
            loadUserPosts();
        }
    }

    // Edit Post
    async function editPost(postId, btn) {
        const postArticle = document.getElementById(`post-${postId}`);
        const contentP = postArticle.querySelector('.post-content');
        const originalContent = contentP.textContent;
        const newContent = prompt('Edit your post:', originalContent);
        if (newContent === null || newContent.trim() === '' || newContent === originalContent) return;

        try {
            await api.put(`/posts/${postId}`, { content: newContent });
            contentP.textContent = newContent;
            alert('Post updated successfully!');
        } catch (e) {
            alert(e.message || 'Could not update post');
        }
    }

    // Delete post
    async function deletePost(postId) {
        if (!confirm('Are you sure you want to delete this post?')) return;
        try {
            await api.delete(`/posts/${postId}`);
            document.getElementById(`post-${postId}`).remove();
            loadProfile();
        } catch (e) {
            alert(e.message || 'Could not delete post');
        }
    }

    loadProfile();
    loadUserPosts();
</script>
</body></html>
