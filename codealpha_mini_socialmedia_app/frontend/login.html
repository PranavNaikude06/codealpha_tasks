<!DOCTYPE html>

            "on-secondary": "#ffffff",
            "on-primary": "#ffffff",
            "inverse-on-surface": "#ecf0ff",
            "surface-container-high": "#e3e8f9",

<body class="flex items-center justify-center min-h-screen bg-[#F7F8FC]">
<script>
  // Redirect if logged in
  api.redirectIfAuthenticated();
</script>
<main class="w-full max-w-[400px] px-container-margin">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_1px_4px_rgba(0,0,0,0.08)] p-xl flex flex-col items-center">
<!-- Brand Identity -->
<div class="text-center mb-xl">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Nexus</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Share. Connect. Explore.</p>
</div>
<!-- Error alert box -->
<div id="error-message" class="w-full mb-md p-sm bg-error-container text-error font-body-md text-body-md rounded-lg hidden"></div>

<!-- Login Form -->
<form class="w-full space-y-md" id="login-form">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email</label>
<div class="relative">
<input class="w-full h-[48px] px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-outline" id="email" placeholder="name@example.com" type="email" required/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="w-full h-[48px] px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-xl font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-all placeholder:text-outline" id="password" placeholder="••••••••" type="password" required/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors flex items-center" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-[48px] bg-primary-container text-on-primary font-body-md text-body-md font-bold rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit" id="submit-btn">
          Login
        </button>
</form>
<!-- Footer Action -->
<div class="mt-xl pt-lg border-t border-outline-variant w-full text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
          Don't have an account? 
          <a class="text-primary font-bold hover:underline transition-all" href="register.html">Register</a>
</p>
</div>
</div>
<!-- Background Illustration / Aesthetic Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] bg-secondary-container rounded-full blur-[100px]"></div>
</div>
</main>
<script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eye-icon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.textContent = 'visibility_off';
      } else {
        passwordInput.type = 'password';
        eyeIcon.textContent = 'visibility';
      }
    }

    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errMsg = document.getElementById('error-message');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      errMsg.classList.add('hidden');
      submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size: 20px;">progress_activity</span> Logging in...';
      submitBtn.disabled = true;

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await api.post('/auth/login', { email, password });
        api.setToken(response.token);
        api.setUser(response.user);
        window.location.href = 'index.html';
      } catch (err) {
        errMsg.textContent = err.message || 'Login failed';
        errMsg.classList.remove('hidden');
        submitBtn.innerHTML = 'Login';
        submitBtn.disabled = false;
      }
    });
  </script>
</body></html>
