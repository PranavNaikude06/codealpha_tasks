<!-- TopAppBar -->

</div>
</header>
<main class="min-h-[calc(100vh-64px)] flex items-center justify-center p-md pb-24 md:pb-8">
<!-- Edit Profile Card -->
<div class="w-full max-w-[500px] bg-surface-container-lowest card-shadow rounded-xl p-xl">
<div class="mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Edit Profile</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Update your personal information and profile appearance.</p>
</div>
<form id="edit-profile-form" class="space-y-lg" onsubmit="return false;">
<!-- Error Message -->
<div id="error-message" class="hidden text-error font-body-md text-body-md bg-error-container p-md rounded-xl mb-md"></div>

<!-- Avatar Preview (UX enhancement) -->
<div class="flex flex-col items-center gap-md mb-xl">
<div class="relative w-24 h-24">
<img alt="Profile Preview" class="w-full h-full rounded-full object-cover border-4 border-surface-container-high transition-opacity duration-300" id="avatar-preview" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150"/>
<div class="absolute bottom-0 right-0 bg-primary p-xs rounded-full border-2 border-surface-container-lowest">
<span class="material-symbols-outlined text-[16px] text-on-primary">photo_camera</span>
</div>
</div>
</div>
<!-- Username Field (Disabled) -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface-variant px-xs">Username</label>
<div class="relative">
<input id="username-input" class="w-full h-12 px-md rounded-xl border border-outline-variant bg-surface-container-low text-on-surface-variant font-body-md text-body-md cursor-not-allowed opacity-75" disabled="" type="text" value="@..."/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">lock</span>
</div>
</div>
<!-- Avatar URL Field -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface-variant px-xs" for="avatar_url">Avatar URL</label>
<input class="w-full h-12 px-md rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="avatar_url" placeholder="https://example.com/photo.jpg" type="text"/>
</div>
<!-- Bio Textarea -->
<div class="space-y-base">
<label class="font-label-sm text-label-sm text-on-surface-variant px-xs" for="bio">Bio</label>
<textarea class="w-full p-md rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all resize-none" id="bio" placeholder="Tell us about yourself..." rows="3"></textarea>
</div>

<span class="material-symbols-outlined">explore</span>
</a>

<span class="material-symbols-outlined">account_circle</span>
</a>
<a class="flex flex-col items-center gap-xs text-primary p-sm" href="edit_profile.html">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">settings</span>
</a>
</footer>
<script src="api.js"></script>
<!-- Logic and Micro-interaction Script -->
<script>
        api.checkAuth();
        const currentUser = api.getUser();

        document.addEventListener('DOMContentLoaded', () => {
            const avatarInput = document.getElementById('avatar_url');
            const avatarPreview = document.getElementById('avatar-preview');
            const usernameInput = document.getElementById('username-input');
            const bioTextarea = document.getElementById('bio');
            const editForm = document.getElementById('edit-profile-form');
            const errorMsg = document.getElementById('error-message');
            const cancelBtn = document.getElementById('cancel-btn');
            const saveBtn = document.getElementById('save-btn');

            // Setup Navigation links
            const profileHref = `profile.html?username=${currentUser.username}`;
            document.getElementById('nav-profile-link').href = profileHref;
            if (document.getElementById('mobile-nav-profile-link')) document.getElementById('mobile-nav-profile-link').href = profileHref;
            if (document.getElementById('mobile-bottom-profile-link')) document.getElementById('mobile-bottom-profile-link').href = profileHref;

            // Load latest profile details from server
            async function loadProfile() {
                try {
                    const data = await api.get(`/users/${currentUser.username}`);
                    usernameInput.value = `@${data.username}`;
                    avatarInput.value = data.avatar_url || '';
                    bioTextarea.value = data.bio || '';
                    avatarPreview.src = data.avatar_url || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150';
                } catch (e) {
                    console.error('Failed to load profile details', e);
                    // fallback to localStorage
                    usernameInput.value = `@${currentUser.username}`;
                    avatarInput.value = currentUser.avatar_url || '';
                    bioTextarea.value = currentUser.bio || '';
                    avatarPreview.src = currentUser.avatar_url || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150';
                }
            }

            // Sync avatar preview on input
            avatarInput.addEventListener('input', (e) => {
                const url = e.target.value.trim();
                if (url.startsWith('http')) {
                    avatarPreview.src = url;
                } else if (url === '') {
                    avatarPreview.src = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150';
                }
            });

            // Smooth focus interaction
            const inputs = document.querySelectorAll('input:not([disabled]), textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('scale-[1.01]');
                });
            });

            // Cancel button
            cancelBtn.addEventListener('click', () => {
                window.location.href = `profile.html?username=${currentUser.username}`;
            });

            // Form Submit
            editForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.classList.add('hidden');
                errorMsg.textContent = '';

                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';

                const avatarUrlVal = avatarInput.value.trim();
                const bioVal = bioTextarea.value.trim();

                try {
                    const response = await api.put(`/users/${currentUser.username}`, {
                        avatar_url: avatarUrlVal,
                        bio: bioVal
                    });

                    // Update cached user object in localStorage
                    const updatedUser = { ...currentUser, ...response };
                    api.setUser(updatedUser);

                    alert('Profile updated successfully!');
                    window.location.href = `profile.html?username=${currentUser.username}`;
                } catch (err) {
                    errorMsg.textContent = err.message || 'Failed to update profile';
                    errorMsg.classList.remove('hidden');
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save Changes';
                }
            });

            loadProfile();
        });
    </script>
</body></html>
