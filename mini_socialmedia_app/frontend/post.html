<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexus - Post Detail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "on-tertiary-container": "#fff6f2",

                        "on-background": "#161c27",
                        "tertiary": "#874a00",
                        "inverse-primary": "#bdc2ff",
                        "tertiary-container": "#aa5f00",

                        "on-primary-container": "#faf7ff",
                        "surface-container-low": "#f1f3ff",
                        "error-container": "#ffdad6",

                        "on-surface": "#161c27",
                        "on-primary-fixed": "#000965",
                        "on-error-container": "#93000a",

                        "primary-fixed-dim": "#bdc2ff",

                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#556479",
                        "surface-tint": "#4552c3",
                        "surface-container": "#e8eeff",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#ecf0ff",
                        "surface-container-high": "#e3e8f9",
                        "tertiary-fixed": "#ffdcc1",
                        "surface-variant": "#dde2f3",
                        "primary": "#404dbe",
                        "on-tertiary-fixed": "#2e1500",
                        "inverse-surface": "#2a303d",
                        "secondary": "#515f74",
                        "tertiary-fixed-dim": "#ffb778"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                    "spacing": {

                        "container-margin": "16px",

                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],

                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-sm": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["15px", {"lineHeight": "22px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #f7f8fc;
            font-family: 'Inter', sans-serif;
        }
        .content-card {
            box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.08);
            border: 1px solid #E2E8F0;
        }
    </style>
</head>
<body class="bg-background text-on-background">
<header class="bg-surface-container-lowest sticky top-0 z-50 border-b border-outline-variant">
<div class="flex justify-between items-center w-full px-lg py-sm max-w-7xl mx-auto">
<a class="font-headline-md text-headline-md font-bold text-primary" href="index.html">Nexus</a>
<nav class="hidden md:flex gap-lg items-center">
<a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md" href="index.html">Feed</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md" href="explore.html">Explore</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md" id="nav-profile-link" href="#">Profile</a>
<a class="text-on-surface-variant hover:text-primary transition-colors font-body-md text-body-md" href="#" onclick="api.logout(); return false;">Logout</a>
</nav>
<!-- Mobile Menu Toggle -->
<button class="md:hidden text-on-surface-variant" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
<span class="material-symbols-outlined">menu</span>
</button>
</div>
<!-- Mobile Dropdown Menu -->
<div id="mobile-menu" class="hidden md:hidden bg-surface-container-lowest border-b border-outline-variant py-sm px-lg flex flex-col gap-sm">
<a class="text-on-surface-variant hover:text-primary font-body-md text-body-md" href="index.html">Feed</a>
<a class="text-on-surface-variant hover:text-primary font-body-md text-body-md" href="explore.html">Explore</a>
<a class="text-on-surface-variant hover:text-primary font-body-md text-body-md" id="mobile-nav-profile-link" href="#">Profile</a>
<a class="text-on-surface-variant hover:text-primary font-body-md text-body-md" href="#" onclick="api.logout(); return false;">Logout</a>
</div>
</header>
<main class="max-w-[640px] mx-auto px-container-margin py-xl flex flex-col gap-lg">
<!-- Back navigation -->
<div>
  <button onclick="history.length > 1 ? history.back() : window.location.href='index.html'" class="flex items-center gap-xs text-on-surface-variant hover:text-primary transition-colors font-label-sm text-label-sm group">
    <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-0.5 transition-transform">arrow_back</span>
    Back
  </button>
</div>
<!-- Dynamic Post detail section -->
<section class="bg-surface-container-lowest content-card rounded-xl overflow-hidden" id="post-detail-card">
  <!-- Post content loaded via JS -->
  <div class="p-md text-center text-on-surface-variant">Loading post details...</div>
</section>

<!-- Comments section -->
<section class="flex flex-col gap-md">
<h2 class="font-headline-lg text-headline-lg text-on-surface px-base">Comments (<span id="comments-count">0</span>)</h2>
<div class="flex flex-col gap-gutter" id="comments-list">
  <!-- Comments loaded via JS -->
</div>
</section>

<!-- Comment input box footer -->
<footer class="sticky bottom-md bg-surface-container-lowest content-card rounded-xl p-md border border-outline-variant flex items-center gap-md">
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high shrink-0">
<img id="footer-avatar" alt="CurrentUser" class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150"/>
</div>
<div class="relative flex-grow">
<input id="comment-input" class="w-full bg-surface-container-low border border-outline-variant rounded-full py-sm px-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Add a comment..." type="text"/>
</div>
<button id="reply-btn" class="bg-primary text-on-primary font-label-sm text-label-sm px-lg py-sm rounded-full hover:bg-opacity-90 active:scale-95 transition-all shadow-sm">
                Reply
            </button>
</footer>
</main>

<script src="api.js"></script>
<script>
    api.checkAuth();
    const currentUser = api.getUser();
    
    // Set profile hrefs
    const profileHref = `profile.html?username=${currentUser.username}`;
    document.getElementById('nav-profile-link').href = profileHref;
    if (document.getElementById('mobile-nav-profile-link')) document.getElementById('mobile-nav-profile-link').href = profileHref;
    document.getElementById('footer-avatar').src = currentUser.avatar_url || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150';

    const postId = new URLSearchParams(window.location.search).get('id');
    if (!postId) {
        window.location.href = 'index.html';
    }

    let postAuthorId = null;

    // Load Post Details
    async function loadPostDetails() {
        const detailCard = document.getElementById('post-detail-card');
        try {
            const post = await api.get(`/posts/${postId}`);
            postAuthorId = post.user_id;

            const isOwn = post.user_id === currentUser.id;
            const likedClass = post.is_liked ? 'text-primary' : 'text-on-surface-variant';
            const likedFill = post.is_liked ? '1' : '0';
            const imageHtml = post.image_url ? `
                <div class="w-full aspect-video bg-surface-container-high overflow-hidden">
                    <img src="${post.image_url}" alt="Post Image" class="w-full h-full object-cover"/>
                </div>` : '';
            const editDeleteHtml = isOwn ? `
                <div class="flex gap-sm">
                    <button onclick="editPost()" class="text-on-surface-variant hover:text-tertiary transition-colors"><span class="material-symbols-outlined text-[20px]">edit</span></button>
                    <button onclick="deletePost()" class="text-on-surface-variant hover:text-error transition-colors"><span class="material-symbols-outlined text-[20px]">delete</span></button>
                </div>` : '';

            detailCard.innerHTML = `
            <div class="p-md flex items-center gap-md">
                <a href="profile.html?username=${post.author.username}" class="w-12 h-12 rounded-full overflow-hidden bg-surface-container-high shrink-0 block">
                    <img src="${post.author.avatar_url || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150'}" alt="${post.author.username}" class="w-full h-full object-cover"/>
                </a>
                <div class="flex flex-col min-w-0">
                    <a href="profile.html?username=${post.author.username}" class="font-headline-md text-headline-md text-on-surface hover:underline break-all">${post.author.username}</a>
                    <span class="font-label-sm text-label-sm text-on-surface-variant">${api.formatRelativeTime(post.created_at)} ${post.is_edited ? '• Edited' : ''}</span>
                </div>
            </div>
            <div class="px-md pb-md">
                <p id="post-content-text" class="font-body-lg text-body-lg text-on-surface leading-relaxed whitespace-pre-wrap">${post.content}</p>
            </div>
            ${imageHtml}
            <div class="p-md flex items-center justify-between border-t border-outline-variant mt-sm">
                <div class="flex gap-lg">
                    <button onclick="toggleLike(this)" class="flex items-center gap-xs ${likedClass} transition-colors">
                        <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' ${likedFill}">favorite</span>
                        <span class="font-label-sm text-label-sm" id="post-like-count">${post.like_count}</span>
                    </button>
                    <div class="flex items-center gap-xs text-on-surface-variant">
                        <span class="material-symbols-outlined text-[20px]">chat_bubble</span>
                        <span class="font-label-sm text-label-sm">${post.comment_count}</span>
                    </div>
                </div>
                ${editDeleteHtml}
            </div>`;
        } catch (e) {
            detailCard.innerHTML = `<div class="p-md text-center text-error">Failed to load post. It may have been deleted.</div>`;
        }
    }

    // Load Comments
    async function loadComments() {
        const commentsList = document.getElementById('comments-list');
        try {
            const comments = await api.get(`/posts/${postId}/comments`);
            document.getElementById('comments-count').textContent = comments.length;

            if (comments.length === 0) {
                commentsList.innerHTML = `<div class="text-center text-on-surface-variant py-md">No comments yet. Be the first to comment!</div>`;
                return;
            }

            commentsList.innerHTML = comments.map(c => {
                const canDelete = c.user_id === currentUser.id || postAuthorId === currentUser.id;
                const deleteBtn = canDelete ? `
                    <button onclick="deleteComment(${c.id})" class="ml-auto text-on-surface-variant hover:text-error transition-all" title="Delete Comment">
                        <span class="material-symbols-outlined text-[18px]">delete</span>
                    </button>` : '';

                return `
                <div class="bg-surface-container-lowest content-card rounded-xl p-md flex gap-md items-start">
                    <a href="profile.html?username=${c.username}" class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high shrink-0 block">
                        <img src="${c.avatar_url || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&h=150'}" alt="${c.username}" class="w-full h-full object-cover"/>
                    </a>
                    <div class="flex-grow flex flex-col gap-xs">
                        <div class="flex items-center gap-sm">
                            <a href="profile.html?username=${c.username}" class="font-label-sm text-label-sm font-bold text-on-surface hover:underline">${c.username}</a>
                            <span class="font-label-sm text-label-sm text-outline">${api.formatRelativeTime(c.created_at)}</span>
                            ${deleteBtn}
                        </div>
                        <p class="font-body-md text-body-md text-on-surface-variant whitespace-pre-wrap">${c.content}</p>
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            console.error('Failed to load comments', e);
        }
    }

    // Toggle post like
    async function toggleLike(btn) {
        const icon = btn.querySelector('.material-symbols-outlined');
        const countSpan = document.getElementById('post-like-count');
        const isLiked = icon.style.fontVariationSettings.includes("'FILL' 1");
        
        let count = parseInt(countSpan.textContent);
        
        if (isLiked) {
            icon.style.fontVariationSettings = "'FILL' 0";
            btn.classList.remove('text-primary');
            btn.classList.add('text-on-surface-variant');
            countSpan.textContent = count - 1;
        } else {
            icon.style.fontVariationSettings = "'FILL' 1";
            btn.classList.add('text-primary');
            btn.classList.remove('text-on-surface-variant');
            countSpan.textContent = count + 1;
        }

        try {
            if (isLiked) {
                await api.delete(`/posts/${postId}/like`);
            } else {
                await api.post(`/posts/${postId}/like`);
            }
        } catch (e) {
            console.error(e);
            loadPostDetails();
        }
    }

    // Submit a comment
    const replyBtn = document.getElementById('reply-btn');
    const commentInput = document.getElementById('comment-input');

    async function submitComment() {
        const val = commentInput.value.trim();
        if (!val) return;

        replyBtn.disabled = true;
        replyBtn.textContent = 'Posting...';

        try {
            await api.post(`/posts/${postId}/comments`, { content: val });
            commentInput.value = '';
            await loadComments();
            await loadPostDetails();
        } catch (err) {
            alert(err.message || 'Failed to post comment');
        } finally {
            replyBtn.disabled = false;
            replyBtn.textContent = 'Reply';
        }
    }

    replyBtn.addEventListener('click', submitComment);
    commentInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitComment();
    });

    // Edit Post
    async function editPost() {
        const contentP = document.getElementById('post-content-text');
        const originalContent = contentP.textContent;
        const newContent = prompt('Edit your post:', originalContent);
        if (newContent === null || newContent.trim() === '' || newContent === originalContent) return;

        try {
            await api.put(`/posts/${postId}`, { content: newContent });
            contentP.textContent = newContent;
        } catch (e) {
            alert(e.message || 'Could not update post');
        }
    }

    // Delete post
    async function deletePost() {
        if (!confirm('Are you sure you want to delete this post?')) return;
        try {
            await api.delete(`/posts/${postId}`);
            window.location.href = 'index.html';
        } catch (e) {
            alert(e.message || 'Could not delete post');
        }
    }

    // Delete comment
    async function deleteComment(commentId) {
        if (!confirm('Delete this comment?')) return;
        try {
            await api.delete(`/posts/comments/${commentId}`);
            loadComments();
            loadPostDetails();
        } catch (e) {
            alert(e.message || 'Could not delete comment');
        }
    }

    loadPostDetails().then(loadComments);
</script>
</body></html>
